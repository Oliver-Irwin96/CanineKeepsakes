<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Reset Your Password | Canine Keepsakes</title>
  <meta name="description" content="Reset your Canine Keepsakes account password securely.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap" style="max-width:460px">
  <h1 class="page-title" style="margin-top:28px">Create a new password</h1>
  <p class="muted" id="subtitle" style="margin-top:-10px">Enter a new password below to regain access to your Canine Keepsakes account.</p>

  <form id="reset-form" style="margin-top:18px;display:none">
    <div class="field"><label>New password</label><input required type="password" name="password" minlength="6" autocomplete="new-password"></div>
    <div class="field"><label>Confirm new password</label><input required type="password" name="confirm" minlength="6" autocomplete="new-password"></div>
    <button class="btn-add" id="submit" type="submit" style="width:100%;margin-top:6px">Update Password</button>
  </form>

  <div class="notice" id="msg" style="display:none;margin-top:14px"></div>
</div>

<script src="js/region.js?v=1"></script>
<script src="js/store.js?v=7"></script>
<script src="js/auth.js?v=2"></script>
<script>
(async () => {
  CK.mountChrome();
  const form = document.getElementById('reset-form');
  const msg = document.getElementById('msg');
  const subtitle = document.getElementById('subtitle');
  const show = (t, ok) => { msg.style.display = 'block'; msg.innerHTML = t; };

  let ready = false;
  function enable() { if (ready) return; ready = true; form.style.display = ''; }

  /* The reset email link returns here with a recovery token in the URL hash.
     supabase-js consumes it on init and establishes a temporary session. */
  const client = await CK.auth.init();
  client.auth.onAuthStateChange((event, session) => { if (event === 'PASSWORD_RECOVERY' || session) enable(); });
  try {
    const { data } = await client.auth.getSession();
    if (data.session) enable();
  } catch (_) {}

  // Give the URL-hash detection a moment; if no recovery session, guide the user.
  setTimeout(() => {
    if (!ready) {
      subtitle.textContent = '';
      show('This page only works from the secure reset link in your email. Please open that link again, or <a href="login.html">request a new password reset</a>.', false);
    }
  }, 1500);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = e.target.password.value;
    const confirm = e.target.confirm.value;
    if (pw !== confirm) { show('Those passwords don’t match — please re-enter them.', false); return; }
    const submit = document.getElementById('submit');
    submit.disabled = true; const orig = submit.textContent; submit.textContent = 'Updating…';
    try {
      const { error } = await CK.auth.updatePassword(pw);
      if (error) { show('Could not update password: ' + error.message, false); }
      else {
        form.style.display = 'none';
        show('Password updated ✓ You’re all set. <a href="account.html">Go to My Account</a>', true);
      }
    } catch (err) {
      show('Something went wrong: ' + err.message, false);
    } finally {
      submit.disabled = false; submit.textContent = orig;
    }
  });
})();
</script>
</body>
</html>
