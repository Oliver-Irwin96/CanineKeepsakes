[build]
  publish = "."
  functions = "netlify/functions"

# Secret-scan false positives, excluded by key:
#  - PAYPAL_ENV: value is a mode flag ("live"/"sandbox"), not a secret.
#  - CF_WEB_ANALYTICS_SITE_TAG: Cloudflare Web Analytics beacon token; PUBLIC by
#    design (it sits in js/store.js on every page). The real secret,
#    CLOUDFLARE_API_TOKEN, is NOT omitted and never appears in any file.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "PAYPAL_ENV,CF_WEB_ANALYTICS_SITE_TAG,PRODIGI_API_KEY,PRODIGI_SANDBOX_API_KEY,PRODIGI_LIVE_API_KEY"

# --- Security headers (safe defaults; no CSP to avoid breaking inline scripts /
#     fonts / esm.sh / PayPal / Supabase). Applied to every response. ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# --- Security (N1): block public access to server source, internal docs & notes ---
# publish = "." serves the whole repo, so these real files were publicly fetchable.
# force = true makes each redirect win over static file serving, returning 404
# instead of the file's contents. These paths are NOT used by the app:
#   - the app calls functions via /api/*  ->  /.netlify/functions/* (different path,
#     unaffected); the literal /netlify/* path is just the un-bundled source.
#   - no public page links to any doc/notes path below.
[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/Knowledge/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/Handoffs/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/AI_CHANGE_CONTROL.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/PROJECT_OWNERSHIP_MATRIX.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README_s4.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/2026-06-16_CK_Handoff_s4.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/2026-06-16_CK_Knowledge_Capture_s4.md"
  to = "/404.html"
  status = 404
  force = true

# Required environment variables (Netlify dashboard → Site settings → Environment):
#   PRINTFUL_API_KEY          — from Printful Manual order / API store
#   PAYPAL_CLIENT_ID          — PayPal Business REST app
#   PAYPAL_CLIENT_SECRET      — PayPal Business REST app
#   PAYPAL_ENV                — "sandbox" or "live"
#
#   SUPABASE_URL              — your Supabase project URL (set in Netlify env, not committed here)
#   SUPABASE_ANON_KEY         — public anon key (safe in browser; served via /api/supabase-config)
#   SUPABASE_SERVICE_ROLE_KEY — SECRET service-role key (server functions only; bypasses RLS — never expose)
#
#   RESEND_API_KEY            — Resend API key (re_...) for transactional emails (/api/notify). If unset, emails no-op safely.
#   RESEND_FROM               — optional, default "Canine Keepsakes <noreply@caninekeepsakes.co.uk>"
#   RESEND_REPLY_TO           — optional, default caninekeepsakes.admin@gmail.com
#
#   DESIGN_FEE_GBP / DESIGN_FEE_EXTRA_DOG / DESIGN_FEE_EXTRA_REVISION / DESIGN_FEE_PRIORITY
#     — optional price overrides. If SET, they override the code defaults (9.99 / 6.99 / 3.99 / 6.99).
#       Clear them or set them to the new prices, or the old values will keep charging.
