<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Checkout — Canine Keepsakes</title>
  <meta name="description" content="Secure checkout for Canine Keepsakes printed-to-order dog artwork products.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <!-- PayPal SDK loaded dynamically via /api/paypal-config -->
</head>
<body>

<div class="wrap">
  <h1 class="page-title">Secure checkout</h1>
  <p class="muted" style="max-width:60ch">Your items are printed to order and shipped to the address below. Payment is handled securely through PayPal.</p>
  <div class="two-col">
    <div>
      <h3 style="margin-bottom:18px;font-family:var(--font-display)">Where should we send your order?</h3>
      <form id="ship-form">
        <div class="field-row">
          <div class="field"><label>First name</label><input required name="first_name" autocomplete="given-name"></div>
          <div class="field"><label>Last name</label><input required name="last_name" autocomplete="family-name"></div>
        </div>
        <div class="field"><label>Email</label><input required type="email" name="email" autocomplete="email"></div>
        <div class="field"><label>Address line 1</label><input required name="address1" autocomplete="address-line1"></div>
        <div class="field"><label>Address line 2 <small>(optional)</small></label><input name="address2" autocomplete="address-line2"></div>
        <div class="field-row">
          <div class="field"><label>Town / City</label><input required name="city" autocomplete="address-level2"></div>
          <div class="field"><label>Postcode</label><input required name="zip" autocomplete="postal-code"></div>
        </div>
        <div class="field"><label>Country</label><select name="country_code" id="country-select">
          <option value="GB" selected>United Kingdom (GBP)</option>
          <option value="US">United States (USD)</option>
          <option value="CA">Canada (CAD)</option>
          <option value="AU">Australia (AUD)</option>
          <option value="NZ">New Zealand (NZD)</option>
        </select></div>
      </form>

      <button class="btn-add" id="btn-rates" style="margin-top:8px">Calculate Delivery</button>
      <div id="rates-area"></div>

      <div id="paypal-area" style="margin-top:24px">
        <p class="muted" style="font-size:.88rem;margin-bottom:10px">Secure payment via PayPal. You can pay using your PayPal account or supported card options.</p>
        <div id="paypal-button-container"></div>
        <div class="notice" id="paypal-notice">Loading payment options…</div>
      </div>
    </div>

    <div class="summary" id="summary-box"></div>
  </div>
</div>

<script src="js/region.js?v=1"></script>
<script src="js/store.js?v=7"></script>
<script src="js/auth.js?v=2"></script>
<script>
(() => {
  CK.mountChrome();
  const box = document.getElementById('summary-box');
  const form = document.getElementById('ship-form');
  const countrySel = document.getElementById('country-select');
  const esc = s => String(s == null ? '' : s).replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));
  let shipping = null;            // { id, name, rate } in the active currency
  let clientId = null;            // PayPal client id (from /api/paypal-config)

  /* active currency follows the chosen shipping country (server enforces the same) */
  CKRegion.setRegionByCountry(countrySel.value);

  /* Login is required to check out. Bounce anonymous visitors to the login
     page, then prefill the form from their account. */
  (async () => {
    let session = null;
    try { session = await CK.auth.session(); } catch (_) {}
    if (!session) { location.href = 'login.html?redirect=checkout.html'; return; }
    const form = document.getElementById('ship-form');
    if (session.user?.email) form.email.value = session.user.email;
    try {
      const prof = await CK.auth.profile();
      if (prof) ['first_name','last_name','address1','address2','city','zip'].forEach(k => { if (prof[k] && !form[k].value) form[k].value = prof[k]; });
    } catch (_) {}
  })();

  function renderSummary() {
    const b = CK.getBasket();
    if (!b.length) { box.innerHTML = '<p>Your basket is empty. Head back to the collections to choose your dog artwork.</p><a class="btn-gold" style="display:block;text-align:center;margin-top:12px" href="index.html#collections">Explore Collections</a>'; return; }
    const sub = CK.basketTotal();
    const total = sub + (shipping ? shipping.rate : 0);
    const shipText = shipping ? (shipping.rate ? CK.money(shipping.rate) : 'Free') + ' · ' + esc(shipping.name) : 'calculated below';
    box.innerHTML = `
      ${b.map(i => `<div class="row"><span>${esc(i.collectionName)} ${esc(i.productName)} ×${esc(i.qty)}</span><span>${CK.money(CK.lineTotal(i))}</span></div>`).join('')}
      <div class="row"><span>Delivery</span><span>${shipText}</span></div>
      <div class="row total"><span>Total (${CKRegion.currency})</span><span>${CK.money(total)}</span></div>`;
  }
  renderSummary();

  /* delivery: fixed flat rate per region (free over threshold) — the customer is
     charged exactly this; server computes the same figure. */
  document.getElementById('btn-rates').onclick = async () => {
    if (!form.reportValidity()) return;
    const fd = Object.fromEntries(new FormData(form));
    const area = document.getElementById('rates-area');
    area.innerHTML = '<div class="notice">Checking delivery…</div>';
    try {
      const res = await fetch('/api/shipping-rates', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ recipient: fd, items: CK.getBasket() })
      });
      const data = await res.json();
      if (!data.available) { area.innerHTML = '<div class="notice">⚠️ We don\'t ship to that country yet.</div>'; shipping = null; renderSummary(); return; }
      const opt = (data.options || [])[0] || { id: 'STANDARD', name: 'Standard delivery', rate: CKRegion.shipFlat };
      shipping = { id: opt.id, name: opt.name, rate: opt.rate };
      const line = opt.rate ? `${esc(opt.name)} — ${CK.money(opt.rate)}` : `${esc(opt.name)} — Free`;
      const hint = (!data.freeQualified && data.freeShippingThreshold) ? ` · Free over ${CK.money(data.freeShippingThreshold)}` : '';
      area.innerHTML = `<div class="notice">✓ ${line}${hint}</div>`;
      renderSummary();
    } catch {
      shipping = { id: 'STANDARD', name: 'Standard delivery', rate: CKRegion.shipFlat };
      area.innerHTML = '<div class="notice">Standard delivery applied. Final delivery confirmed on your order.</div>';
      renderSummary();
    }
  };

  /* changing country switches currency + delivery and reloads PayPal in the new currency */
  countrySel.onchange = () => {
    CKRegion.setRegionByCountry(countrySel.value);
    shipping = null;
    document.getElementById('rates-area').innerHTML = '';
    renderSummary();
    if (clientId) loadPayPal();
  };

  /* Authenticated POST helper — attaches the Supabase access token so the
     create-order / capture-order functions can verify the customer. */
  async function authPost(url, body) {
    const token = await CK.auth.token();
    return fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { Authorization: `Bearer ${token}` } : {})
      },
      body: JSON.stringify(body)
    });
  }

  /* Load the PayPal SDK for the ACTIVE currency and mount the buttons. PayPal fixes the
     currency at SDK load, so when the country (currency) changes we remove the old SDK and
     reload. Client id comes from the server (keeps it out of the secret scanner). */
  function loadPayPal() {
    const cur = CKRegion.currency;
    document.querySelectorAll('script[data-ppsdk]').forEach(s => s.remove());
    if (window.paypal) { try { delete window.paypal; } catch (_) { window.paypal = undefined; } }
    const cont = document.getElementById('paypal-button-container');
    const notice = document.getElementById('paypal-notice');
    cont.innerHTML = '';
    notice.style.display = ''; notice.textContent = 'Loading payment options…';
    const script = document.createElement('script');
    script.src = `https://www.paypal.com/sdk/js?client-id=${clientId}&currency=${cur}`;
    script.setAttribute('data-ppsdk', '1');
    script.onload = () => {
      notice.style.display = 'none';
      paypal.Buttons({
        createOrder: () => authPost('/api/create-order', {
          items: CK.getBasket(), shipping,
          recipient: Object.fromEntries(new FormData(form))
        }).then(r => r.json()).then(d => { if (!d.id) throw new Error(d.error || 'create failed'); return d.id; }),
        onApprove: data => authPost('/api/capture-order', {
          orderID: data.orderID, items: CK.getBasket(), shipping,
          recipient: Object.fromEntries(new FormData(form))
        }).then(r => r.json()).then(d => {
          if (d.status === 'COMPLETED') {
            CK.saveBasket([]);
            const review = d.fulfilment === 'MANUAL_REVIEW_REQUIRED' || d.fulfilment === 'MANUAL_FOLLOWUP_REQUIRED';
            document.querySelector('.two-col').innerHTML =
              '<div class="empty-state" style="grid-column:1/-1"><div class="big">🎉</div><h2>Order confirmed — thank you!</h2><p>' +
              (review
                ? 'Thanks — your payment went through. We\'re giving this order a quick manual check and will email you shortly.'
                : 'Thanks — your keepsake is heading to print. Confirmation email on its way.') +
              ' <a href="account.html">View your orders →</a></p></div>';
          } else alert('Payment could not be completed. You have not been charged.');
        })
      }).render('#paypal-button-container');
    };
    script.onerror = () => { notice.textContent = '⚠️ Could not load payment options. Please refresh.'; };
    document.head.appendChild(script);
  }

  fetch('/api/paypal-config')
    .then(r => r.json())
    .then(d => {
      if (d.clientId) { clientId = d.clientId; loadPayPal(); }
      else document.getElementById('paypal-notice').textContent = '⚠️ Payment unavailable — config missing.';
    })
    .catch(() => {
      document.getElementById('paypal-notice').textContent = '⚠️ Could not load payment options. Please refresh.';
    });
})();
</script>
</body>
</html>
