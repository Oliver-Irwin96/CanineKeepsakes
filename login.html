<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Sign In or Create Account | Canine Keepsakes</title>
  <meta name="description" content="Sign in or create a Canine Keepsakes account to track orders and checkout faster.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap" style="max-width:460px">
  <h1 class="page-title" id="title" style="margin-top:28px">Welcome back</h1>
  <p class="muted" id="subtitle" style="margin-top:-10px">Sign in to checkout faster, track orders and manage your Canine Keepsakes account.</p>

  <form id="auth-form" style="margin-top:18px">
    <div class="field"><label>Email</label><input required type="email" name="email" autocomplete="email"></div>
    <div class="field"><label>Password</label><input required type="password" name="password" minlength="6" autocomplete="current-password"></div>
    <button class="btn-add" id="submit" type="submit" style="width:100%;margin-top:6px">Sign In</button>
  </form>

  <div class="notice" id="msg" style="display:none;margin-top:14px"></div>

  <p class="muted" style="margin-top:14px" id="forgot-line">
    <a href="#" id="forgot">Forgot your password?</a> <span style="opacity:.8">We'll email you a secure reset link.</span>
  </p>

  <p class="muted" style="margin-top:10px" id="toggle-line">
    New here? <a href="#" id="toggle">Create an account</a>
  </p>
</div>

<script src="js/region.js?v=1"></script>
<script src="js/store.js?v=7"></script>
<script src="js/auth.js?v=2"></script>
<script>
(() => {
  CK.mountChrome();
  const params = new URLSearchParams(location.search);
  /* SECURITY: only allow redirecting to a same-site relative .html page (e.g.
     checkout.html). Blocks open redirects (//evil.com, https://evil.com) and
     javascript:/data: URIs that could run in-page. Anything else -> account.html. */
  const rawRedirect = params.get('redirect') || 'account.html';
  const redirect = /^[\w\-]+\.html([?#][^\s]*)?$/.test(rawRedirect) ? rawRedirect : 'account.html';
  let mode = 'signin'; // or 'signup'

  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const submit = document.getElementById('submit');
  const toggle = document.getElementById('toggle');
  const toggleLine = document.getElementById('toggle-line');
  const pw = document.querySelector('input[name=password]');
  const msg = document.getElementById('msg');
  const forgotLine = document.getElementById('forgot-line');

  function show(text, ok) {
    msg.style.display = 'block';
    msg.textContent = text;
    msg.style.borderColor = ok ? '' : '';
  }
  function showHTML(html) {
    msg.style.display = 'block';
    msg.innerHTML = html;
  }

  function setMode(m) {
    mode = m;
    if (m === 'signup') {
      title.textContent = 'Join the pack';
      subtitle.textContent = 'Create an account to checkout faster, save your details and track your orders.';
      submit.textContent = 'Create Account';
      pw.setAttribute('autocomplete', 'new-password');
      toggleLine.innerHTML = 'Already have an account? <a href="#" id="toggle">Sign in</a>';
      forgotLine.style.display = 'none';
    } else {
      title.textContent = 'Welcome back';
      subtitle.textContent = 'Sign in to checkout faster, track orders and manage your Canine Keepsakes account.';
      submit.textContent = 'Sign In';
      pw.setAttribute('autocomplete', 'current-password');
      toggleLine.innerHTML = 'New here? <a href="#" id="toggle">Create an account</a>';
      forgotLine.style.display = '';
    }
    document.getElementById('toggle').onclick = (e) => { e.preventDefault(); setMode(mode === 'signin' ? 'signup' : 'signin'); };
    msg.style.display = 'none';
  }
  setMode('signin');

  /* Forgot password: emails a reset link (neutral wording — never reveals
     whether an account exists, to avoid leaking who's registered). */
  document.getElementById('forgot').onclick = async (e) => {
    e.preventDefault();
    const email = document.querySelector('input[name=email]').value.trim();
    if (!email) { show('Enter your email above first, then tap “Forgot your password?” again.', false); return; }
    try {
      await CK.auth.requestPasswordReset(email);
      show('If an account exists for ' + email + ', we’ve emailed a password reset link. Check your inbox.', true);
    } catch (err) {
      show('Could not send reset email: ' + err.message, false);
    }
  };

  // If already signed in, skip straight to the redirect target.
  CK.auth.session().then(s => { if (s) location.href = redirect; }).catch(() => {});

  document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = e.target.email.value.trim();
    const password = e.target.password.value;
    submit.disabled = true;
    const original = submit.textContent;
    submit.textContent = 'Please wait…';
    try {
      if (mode === 'signup') {
        const { data, error } = await CK.auth.signUp(email, password);
        if (error) { show(error.message, false); }
        else if (data.session) { location.href = redirect; }
        else { show('Account created. Check your email for a confirmation link, then come back and sign in.', true); setMode('signin'); }
      } else {
        const { data, error } = await CK.auth.signIn(email, password);
        if (error) { show(error.message === 'Email not confirmed' ? 'Please confirm your email first — check your inbox for the link.' : error.message, false); }
        else if (data.session) { location.href = redirect; }
      }
    } catch (err) {
      show('Something went wrong: ' + err.message, false);
    } finally {
      submit.disabled = false;
      submit.textContent = original;
    }
  });
})();
</script>
</body>
</html>
