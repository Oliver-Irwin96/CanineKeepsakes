<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Your Basket — Canine Keepsakes</title>
  <meta name="description" content="Review your Canine Keepsakes basket before secure checkout.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>

<div class="wrap">
  <h1 class="page-title">Your basket</h1>
  <div class="two-col">
    <div id="basket-area"></div>
    <div class="summary" id="summary-box"></div>
  </div>
</div>

<script src="js/region.js?v=1"></script>
<script src="js/store.js?v=9"></script>
<script>
(() => {
  CK.mountChrome();
  const area = document.getElementById('basket-area');
  const box = document.getElementById('summary-box');
  const esc = s => String(s == null ? '' : s).replace(/[<>&]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]));

  function render() {
    const b = CK.getBasket();
    if (!b.length) {
      area.innerHTML = `<div class="empty-state"><div class="big"><img src="/images/icons/paw.svg" class="ck-ic" alt=""></div><h3 style="font-family:var(--font-display);margin:0 0 8px">Looks like the dog ran off with your basket.</h3><p>Ready to find the collection that feels most like your dog?</p><p style="margin-top:18px"><a class="btn-gold" href="index.html#collections">Explore Collections</a> <a class="btn-ghost" href="submit-design.html" style="margin-left:8px">Customise With My Dog</a></p></div>`;
      box.style.display = 'none';
      return;
    }
    box.style.display = '';
    area.innerHTML = '<div class="basket-list"></div>';
    const list = area.querySelector('.basket-list');
    b.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'basket-item';
      const thumb = document.createElement('div');
      thumb.className = 'bi-thumb';
      thumb.appendChild(CK.designImg({ thumb: item.thumb }, ''));
      row.appendChild(thumb);
      row.insertAdjacentHTML('beforeend', `
        <div>
          <div class="bi-name">${esc(item.collectionName)} — ${esc(item.productName)}</div>
          <div class="bi-meta">${[item.designLabel, item.colour, item.size, 'qty ' + item.qty].filter(v => v && String(v).trim() && String(v) !== 'undefined').map(esc).join(' · ')}</div>
          <button class="rm" data-i="${i}">Remove</button>
        </div>
        <div class="bi-price">${CK.money(CK.lineTotal(item))}</div>`);
      list.appendChild(row);
    });
    list.querySelectorAll('.rm').forEach(btn => btn.onclick = () => { CK.removeFromBasket(+btn.dataset.i); render(); });

    const sub = CK.basketTotal();
    box.innerHTML = `
      <div class="row"><span>Subtotal</span><span>${CK.money(sub)}</span></div>
      <div class="row"><span>Delivery</span><span>calculated at checkout</span></div>
      <div class="row total"><span>Total (${CKRegion.currency})</span><span>${CK.money(sub)}</span></div>
      <div style="display:grid;gap:6px;margin-top:14px;font-size:.86rem">
        <span>✓ Secure PayPal checkout</span><span>✓ Printed to order</span><span>✓ Worldwide delivery</span><span>✓ Order confirmation by email</span>
      </div>
      <a class="btn-gold" style="display:block;text-align:center;margin-top:18px" href="checkout.html">Continue to Checkout</a>
      <div class="notice" style="margin-bottom:0">Made to order — please allow 2–5 working days for printing, plus delivery. Prices shown in ${CKRegion.currency}.</div>`;
  }
  render();
})();
</script>
</body>
</html>
